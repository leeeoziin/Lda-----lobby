<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const SUPABASE_URL = "https://rwpxtnkbdyyeyxwjupjz.supabase.co";
const SUPABASE_KEY = "sb_publishable_RE8qKSVf3kjuzhieaiKBAA_Bj4En-46";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function carregar(){
  let { data, error } = await client.from("players").select("*");

  if(error){
    console.log(error);
    alert("Erro ao conectar com o banco");
    return;
  }

  data.forEach(j=>{
    j.kd = (j.kills / j.mortes).toFixed(2);
    j.pontos = j.partidas * 3;
  });

  data.sort((a,b)=> b.pontos - a.pontos || b.kd - a.kd);

  let html = "<tr><th>#</th><th>Nome</th><th>KD</th><th>Pontos</th></tr>";

  data.forEach((j,i)=>{
    html += `<tr class="${i==0?"top1":""}">
      <td>${i+1}</td>
      <td>${j.nome}</td>
      <td>${j.kd}</td>
      <td>${j.pontos}</td>
    </tr>`;
  });

  document.getElementById("ranking").innerHTML = html;
}

carregar();
</script>
